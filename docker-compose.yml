services:
  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    volumes:
      - ./src:/app/src
      - ./demo.py:/app/demo.py
      - ./.env:/app/.env
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]

  postgres:
    container_name: postgres
    hostname: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: engineering
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engineering -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
