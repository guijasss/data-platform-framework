services:
  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    volumes:
      - ./src:/app/src
      - ./demo.py:/app/demo.py
      - ./.env:/app/.env
      - ./metadata:/app/metadata
      - ./tasks:/app/tasks
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]

  postgres:
    container_name: postgres
    hostname: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: engineering
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engineering -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_test:
    container_name: postgres_test
    hostname: postgres_test
    image: postgres:16-alpine
    profiles:
      - test
    environment:
      POSTGRES_DB: catalog_test
      POSTGRES_USER: engineering
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engineering -d catalog_test"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  postgres_data:
