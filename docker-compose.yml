services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 2
        done
        mc mb --ignore-existing local/spark
        mc anonymous set private local/spark
    restart: "no"

  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-app
    depends_on:
      minio-init:
        condition: service_completed_successfully
    working_dir: /opt/app
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./src:/opt/app/src
      - ./conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
    ports:
      - "4040:4040"
    command: ["/bin/bash", "-lc", "sleep infinity"]

volumes:
  minio_data:
